name: Daily Menu Sync

on:
  schedule:
    # Runs every day at 06:00 UTC (08:00 Vienna time)
    - cron: '0 6 * * *'
  workflow_dispatch: # also allows manual trigger from GitHub UI

jobs:
  sync-menu:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install requests beautifulsoup4

      - name: Run menu scraper & diff
        id: scrape
        run: python scripts/sync_menu.py
        env:
          NOTIFY_EMAIL: ${{ secrets.NOTIFY_EMAIL }}

      - name: Commit updated menu.json if changed
        run: |
          git config user.name  "Savio Menu Bot"
          git config user.email "bot@savio-menu"
          git add menu.json scripts/menu_snapshot.json
          git diff --cached --quiet || git commit -m "🔄 Auto-update: menu changes detected $(date +'%Y-%m-%d')"
          git push
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Send email notification if changes found
        if: steps.scrape.outputs.changes_found == 'true'
        uses: dawidd6/action-send-mail@v3
        with:
          server_address: smtp.gmail.com
          server_port: 587
          username: ${{ secrets.MAIL_USERNAME }}
          password: ${{ secrets.MAIL_PASSWORD }}
          subject: "☕ Savio Menü Update — ${{ steps.scrape.outputs.summary }}"
          to: ${{ secrets.NOTIFY_EMAIL }}
          from: Savio Menu Bot
          body: ${{ steps.scrape.outputs.email_body }}
