<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover"/>
  <meta name="apple-mobile-web-app-capable" content="yes"/>
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"/>
  <meta name="apple-mobile-web-app-title" content="Savio"/>
  <meta name="theme-color" content="#1c1c1e"/>
  <title>Savio</title>
  <link rel="manifest" href="manifest.json"/>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@300;400;600&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="style.css"/>
</head>
<body>

  <div class="app">

    <!-- ══ SCREEN: DRINKS ══ -->
    <div class="screen active" id="screen-drinks">
      <div class="ios-nav"><span class="ios-nav-title">Getränke</span></div>
      <div class="chip-scroller-wrap">
        <div class="chip-scroller" id="drinks-chips"></div>
      </div>
      <div class="scroll-view">
        <div class="hero">
          <div class="hero-glow"></div>
          <p class="hero-eyebrow">Café · Mattersburg</p>
          <h1 class="hero-wordmark">Savio</h1>
          <p class="hero-tagline">Getränkekarte</p>
          <button class="ghost-pill" id="btn-random-drink">🎲 Zufallsgetränk</button>
        </div>
        <div id="drinks-content"></div>
        <div class="app-footer">
          <p class="app-footer-name">© Café Savio · Mattersburg</p>
          <div class="app-footer-links">
            <button class="footer-link" onclick="openLegal('impressum')">Impressum</button>
            <span class="footer-dot">·</span>
            <button class="footer-link" onclick="openLegal('datenschutz')">Datenschutz</button>
            <span class="footer-dot">·</span>
            <button class="footer-link" onclick="openLegal('odr')">ODR</button>
          </div>
        </div>
        <div class="safe-bottom"></div>
      </div>
    </div>

    <!-- ══ SCREEN: FOOD ══ -->
    <div class="screen" id="screen-food">
      <div class="ios-nav"><span class="ios-nav-title">Speisen</span></div>
      <div class="chip-scroller-wrap">
        <div class="chip-scroller" id="food-chips"></div>
      </div>
      <div class="scroll-view">
        <div class="hero">
          <div class="hero-glow"></div>
          <p class="hero-eyebrow">Café · Mattersburg</p>
          <h1 class="hero-wordmark">Savio</h1>
          <p class="hero-tagline">Speisekarte</p>
          <button class="ghost-pill" id="btn-random-food">🍽 Zufallsspeise</button>
        </div>
        <div id="food-content"></div>
        <div class="app-footer">
          <p class="app-footer-name">© Café Savio · Mattersburg</p>
          <div class="app-footer-links">
            <button class="footer-link" onclick="openLegal('impressum')">Impressum</button>
            <span class="footer-dot">·</span>
            <button class="footer-link" onclick="openLegal('datenschutz')">Datenschutz</button>
            <span class="footer-dot">·</span>
            <button class="footer-link" onclick="openLegal('odr')">ODR</button>
          </div>
        </div>
        <div class="safe-bottom"></div>
      </div>
    </div>

    <!-- ══ SCREEN: SEARCH ══ -->
    <div class="screen" id="screen-search">
      <div class="search-header">
        <div class="search-field-row">
          <div class="search-field">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><circle cx="11" cy="11" r="7"/><path d="m21 21-4.35-4.35"/></svg>
            <input id="search-input" type="search" placeholder="Suchen…" autocomplete="off" autocorrect="off" autocapitalize="none"/>
            <button class="field-clear" id="search-clear" hidden>
              <svg width="16" height="16" viewBox="0 0 24 24" fill="currentColor"><circle cx="12" cy="12" r="10" opacity=".35"/><path d="M15.18 8.82a.75.75 0 0 0-1.06 0L12 10.94 9.88 8.82a.75.75 0 1 0-1.06 1.06L10.94 12l-2.12 2.12a.75.75 0 1 0 1.06 1.06L12 13.06l2.12 2.12a.75.75 0 0 0 1.06-1.06L13.06 12l2.12-2.12a.75.75 0 0 0 0-1.06z"/></svg>
            </button>
          </div>
          <button class="cancel-btn" id="search-cancel">Abbrechen</button>
        </div>
        <div class="chip-scroller-wrap" style="padding-top:0">
          <div class="chip-scroller" id="filter-chips">
            <button class="chip active" data-filter="all">Alles</button>
            <button class="chip" data-filter="drinks">🍹 Getränke</button>
            <button class="chip" data-filter="food">🍕 Essen</button>
            <button class="chip" data-filter="alcoholic">🍷 Alkohol</button>
            <button class="chip" data-filter="non-alcoholic">🌿 Alkoholfrei</button>
            <button class="chip" data-filter="vegetarian">🌱 Vegetarisch</button>
            <button class="chip" data-filter="popular">⭐ Beliebt</button>
          </div>
        </div>
      </div>
      <div class="scroll-view">
        <div id="search-results">
          <div class="empty-state">
            <div class="empty-icon">🔍</div>
            <p class="empty-title">Suchen…</p>
            <p class="empty-sub">Name, Zutat oder Kategorie</p>
          </div>
        </div>
        <div class="safe-bottom"></div>
      </div>
    </div>

  </div>

  <!-- ══ TAB BAR ══ -->
  <nav class="tab-bar">
    <button class="tab active" data-tab="drinks" aria-label="Getränke">
      <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M8 3v2M12 3v2M16 3v2M5 7h14l-1.5 9a2 2 0 0 1-2 1.75H8.5A2 2 0 0 1 6.5 16L5 7z"/><path d="M9 11h6"/></svg>
      <span>Getränke</span>
    </button>
    <button class="tab" data-tab="food" aria-label="Speisen">
      <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M18 8h1a4 4 0 0 1 0 8h-1"/><path d="M2 8h16v9a4 4 0 0 1-4 4H6a4 4 0 0 1-4-4V8z"/><line x1="6" y1="1" x2="6" y2="4"/><line x1="10" y1="1" x2="10" y2="4"/><line x1="14" y1="1" x2="14" y2="4"/></svg>
      <span>Speisen</span>
    </button>
    <button class="tab" data-tab="search" aria-label="Suche">
      <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2"><circle cx="11" cy="11" r="7"/><path d="m21 21-4.35-4.35"/></svg>
      <span>Suche</span>
    </button>
  </nav>

  <!-- ══ BOTTOM SHEET (items) ══ -->
  <div class="sheet-backdrop" id="sheet-backdrop" hidden></div>
  <div class="sheet" id="item-sheet" hidden>
    <div class="sheet-handle-bar"><div class="sheet-handle"></div></div>
    <div class="sheet-scroll-area">
      <div id="sheet-body"></div>
      <div class="safe-bottom"></div>
    </div>
  </div>

  <!-- ══ LEGAL SHEET ══ -->
  <div class="sheet-backdrop" id="legal-backdrop" hidden></div>
  <div class="sheet" id="legal-sheet" hidden>
    <div class="sheet-handle-bar"><div class="sheet-handle"></div></div>
    <div class="sheet-scroll-area">
      <div id="legal-body"></div>
      <div class="safe-bottom"></div>
    </div>
  </div>

  <!-- ══ TOAST ══ -->
  <div class="toast" id="toast" hidden></div>

  <script src="script.js"></script>
</body>
</html>
